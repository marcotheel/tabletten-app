<!doctype html><html lang="de"><head><meta charset="utf-8"><title>Tabletten Erinnerung Dashboard</title><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#2563eb"><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css"></head><body><header class="topbar"><h1>💊 Tabletten</h1><button id="themeBtn" class="icon-btn">🌙</button></header><main><section id="page-dashboard" class="page active"><section class="hero"><div><span>Heute</span><h2 id="todayTitle">Alles im Blick</h2></div><button id="quickAddBtn">＋</button></section><section class="stats"><div><b id="total">0</b><span>Medikamente</span></div><div><b id="due">0</b><span>Offen</span></div><div><b id="critical">0</b><span>Bestellen</span></div></section><section class="card"><div class="section-head"><h2>🕗 Heute fällig</h2><button class="link-btn" data-page="meds">Verwalten</button></div><div id="todayList"></div></section><section class="card"><div class="section-head"><h2>⚠️ Nachbestellen</h2><button class="link-btn" data-page="orders">Liste</button></div><div id="orderPreview"></div></section></section><section id="page-meds" class="page"><div class="section-head"><h2>Medikamente</h2><button id="newMedBtn">＋ Neu</button></div><div id="medList"></div></section><section id="page-form" class="page"><section class="card"><h2 id="formTitle">Medikament anlegen</h2><label>Name / Handelsname<input id="name"></label><div class="grid"><label>Wirkstoff<input id="substance"></label><label>Stärke / Form<input id="strength"></label></div><div class="grid"><label>Hersteller<input id="manufacturer"></label><label>PZN / Barcode<div class="inline"><input id="pzn"><button id="scanBtn" type="button">📷</button></div></label></div><button id="lookupBtn" class="secondary" type="button">PZN über Server suchen</button><p id="lookupInfo" class="muted"></p><div class="grid"><label>Packungsgröße<input id="packSize" type="number" min="1"></label><label>Bestand<input id="stock" type="number" min="0"></label></div><div class="grid"><label>Einnahme pro Einnahme<input id="dosePerTake" type="number" min="0.25" step="0.25" value="1"></label><label>Erinnern ab Restbestand<input id="limit" type="number" min="0" value="10"></label></div><label>Einnahmezeiten<input id="times" placeholder="z. B. 08:00, 20:00"></label><label>Notiz<textarea id="note"></textarea></label><button id="saveBtn">Speichern</button><button id="cancelBtn" class="secondary">Abbrechen</button></section></section><section id="page-history" class="page"><section class="card"><h2>📅 Einnahmeprotokoll</h2><div id="historyList"></div><button id="clearHistoryBtn" class="danger">Protokoll löschen</button></section></section><section id="page-orders" class="page"><section class="card"><h2>🛒 Nachbestellliste</h2><div id="orderList"></div><button id="copyOrderBtn" class="secondary">Liste kopieren</button></section></section><section id="page-settings" class="page"><section class="card"><h2>⚙️ Einstellungen</h2><label>PZN-Server URL<input id="serverUrl" placeholder="https://dein-server.de"></label><button id="saveServerBtn" class="secondary">Server speichern</button><p class="muted">Lokal z. B.: http://raspberrypi.local:5000</p></section><section class="card"><h2>💾 Backup</h2><div class="grid"><button id="exportBtn">Exportieren</button><button id="importBtn" class="secondary">Importieren</button></div><input id="importFile" type="file" accept=".json" hidden></section></section><section id="scanner" class="card hidden"><h2>PZN / Barcode scannen</h2><video id="video" autoplay playsinline></video><p id="scanInfo">Kamera wird gestartet...</p><button id="stopScanBtn" class="secondary">Scanner schließen</button></section></main><nav class="bottom-nav"><button data-page="dashboard" class="active">🏠<span>Start</span></button><button data-page="meds">💊<span>Meds</span></button><button data-page="history">📅<span>Protokoll</span></button><button data-page="orders">🛒<span>Bestellen</span></button><button data-page="settings">⚙️<span>Mehr</span></button></nav><script src="app.js"></script></body></html>
