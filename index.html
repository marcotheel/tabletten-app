<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Tabletten Erinnerung V2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2563eb">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div>
      <h1>Tabletten Erinnerung</h1>
      <p>Bestand prüfen · Nachbestellen · Einnahme dokumentieren</p>
    </div>
  </header>

  <main>
    <section class="summary-grid">
      <div class="summary-card">
        <span id="countTotal">0</span>
        <small>Medikamente</small>
      </div>
      <div class="summary-card warning">
        <span id="countWarning">0</span>
        <small>Bald bestellen</small>
      </div>
      <div class="summary-card critical">
        <span id="countCritical">0</span>
        <small>Kritisch</small>
      </div>
    </section>

    <section class="card">
      <h2>Medikament anlegen</h2>

      <label>Name des Medikaments
        <input id="name" type="text" placeholder="z. B. Blutdrucktabletten">
      </label>

      <div class="two-col">
        <label>Packungsgröße / Stück
          <input id="packSize" type="number" min="1" step="1" placeholder="100">
        </label>

        <label>Aktueller Bestand / Stück
          <input id="stock" type="number" min="0" step="1" placeholder="30">
        </label>
      </div>

      <div class="two-col">
        <label>Einnahme pro Tag
          <input id="dailyDose" type="number" min="0.1" step="0.1" value="1">
        </label>

        <label>Erinnern ab Restbestand
          <input id="reminderLimit" type="number" min="0" step="1" value="10">
        </label>
      </div>

      <label>Farbe
        <select id="color">
          <option value="blue">Blau</option>
          <option value="green">Grün</option>
          <option value="purple">Lila</option>
          <option value="orange">Orange</option>
          <option value="red">Rot</option>
        </select>
      </label>

      <button id="saveBtn">Speichern</button>
      <button id="notifyBtn" class="secondary">Benachrichtigung aktivieren</button>
    </section>

    <section>
      <div class="section-title">
        <h2>Übersicht</h2>
        <button id="checkBtn" class="small">Jetzt prüfen</button>
      </div>
      <div id="medicineList" class="list"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
