<!doctype html><html lang="de"><head><meta charset="utf-8"><title>Tabletten Erinnerung V4</title><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#2563eb"><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css"></head><body><header class="app-header"><div><h1>💊 Tabletten Erinnerung</h1><p>Bestand · Einnahmezeiten · Verlauf · Nachbestellung</p></div><button id="darkModeBtn" class="header-btn">🌙</button></header><main><section class="summary-grid"><div class="summary-card"><span id="countTotal">0</span><small>Medikamente</small></div><div class="summary-card warning"><span id="countDue">0</span><small>Heute fällig</small></div><div class="summary-card critical"><span id="countCritical">0</span><small>Kritisch</small></div></section><section class="card"><h2>Medikament anlegen / bearbeiten</h2><label>Name<input id="name" type="text" placeholder="z. B. Blutdrucktabletten"></label><div class="two-col"><label>Wirkstoff<input id="substance" type="text" placeholder="z. B. Ramipril"></label><label>Stärke<input id="strength" type="text" placeholder="z. B. 5 mg"></label></div><div class="two-col"><label>Hersteller<input id="manufacturer" type="text" placeholder="z. B. Ratiopharm"></label><label>PZN / Barcode<input id="barcode" type="text" placeholder="PZN oder Barcode"></label></div><div class="two-col"><label>Packungsgröße / Stück<input id="packSize" type="number" min="1" step="1" placeholder="100"></label><label>Aktueller Bestand / Stück<input id="stock" type="number" min="0" step="1" placeholder="30"></label></div><div class="two-col"><label>Einnahme pro Tag<input id="dailyDose" type="number" min="0.1" step="0.1" value="1"></label><label>Erinnern ab Restbestand<input id="reminderLimit" type="number" min="0" step="1" value="10"></label></div><label>Einnahmezeiten<input id="times" type="text" placeholder="z. B. 08:00, 20:00"></label><label>Foto der Packung<input id="photo" type="file" accept="image/*"></label><label>Notiz<textarea id="note" placeholder="z. B. morgens nach dem Frühstück"></textarea></label><label>Farbe<select id="color"><option value="blue">Blau</option><option value="green">Grün</option><option value="purple">Lila</option><option value="orange">Orange</option><option value="red">Rot</option></select></label><button id="saveBtn">Speichern</button><button id="cancelEditBtn" class="secondary hidden">Bearbeitung abbrechen</button><button id="notifyBtn" class="secondary">Benachrichtigung aktivieren</button></section><section class="card"><h2>Heute fällige Einnahmen</h2><div id="todayList"></div></section><section class="card"><h2>Nachbestellliste</h2><div id="shoppingList"></div><button id="copyShoppingBtn" class="secondary">Nachbestellliste kopieren</button></section><section class="card"><h2>Einnahmeprotokoll</h2><div id="historyList"></div><button id="clearHistoryBtn" class="delete">Protokoll löschen</button></section><section class="card"><h2>Datensicherung</h2><div class="action-grid"><button id="exportBtn">Backup exportieren</button><button id="importBtn" class="secondary">Backup importieren</button></div><input id="importFile" type="file" accept=".json" hidden></section><section><div class="section-title"><h2>Übersicht</h2><button id="checkBtn" class="small">Jetzt prüfen</button></div><div id="medicineList"></div></section></main><script src="app.js"></script></body></html>
